# Setup:
#   conda env create -f env.yml
#   conda activate mikasa_
#   pip install --no-deps mikasa-robo-suite==0.0.5
name: mikasa_
channels:
  - conda-forge
dependencies:
  - python=3.11.15
  - pip
  - pip:
      # Core ML
      - torch==2.10.0
      - torchvision==0.25.0
      - accelerate==1.13.0
      - diffusers==0.37.0
      - transformers==5.3.0
      - safetensors==0.7.0
      - peft==0.18.1
      - timm==1.0.25
      - tokenizers==0.22.2
      - einops==0.8.2

      # Robotics / Sim (mikasa-robo-suite installed separately with --no-deps)
      - mani-skill==3.0.0b15
      - sapien==3.0.0b1
      - mplib==0.1.1
      - gymnasium==0.29.1
      - fast-kinematics==0.2.2
      - pytorch-kinematics==0.7.4
      - toppra==0.6.3
      - transforms3d==0.4.2
      - robotmq==0.1.13
      - kornia==0.8.2

      # Config / CLI
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      - tyro==1.0.10
      - typer==0.24.1
      - pyyaml==6.0.3

      # Data / Science
      - numpy
      - scipy==1.15.3
      - pandas==2.3.3
      - h5py==3.16.0
      - zarr==3.1.5
      - opencv-python==4.10.0.84
      - pillow==12.1.1
      - matplotlib==3.9.2
      - imageio==2.37.3
      - imageio-ffmpeg==0.6.0
      - trimesh==4.11.4

      # Logging / Monitoring
      - wandb==0.18.5
      - tensorboard==2.18.0

      # Hugging Face
      - huggingface-hub==1.7.2

      # Misc
      - setuptools<71
      - tqdm==4.67.3
      - rich==14.3.3
      - requests==2.32.5
      - lxml==6.0.2
      - dill==0.4.1
      - cloudpickle==3.1.2
